<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC CSE 2027 — Progress Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="root"></div>

<!-- Config: enums, constants, Firebase + Supabase setup (see README.md) -->
<script type="text/babel" src="js/config.js"></script>

<!-- Utils -->
<script type="text/babel" src="js/utils/dateUtils.js"></script>
<script type="text/babel" src="js/utils/dataKeys.js"></script>
<script type="text/babel" src="js/utils/imageCompression.js"></script>

<!-- Services -->
<script type="text/babel" src="js/services/firebaseClient.js"></script>
<script type="text/babel" src="js/services/legacyIdb.js"></script>
<script type="text/babel" src="js/services/supabaseClient.js"></script>

<!-- Data (modules.js must load after all subject/milestone data it references) -->
<script type="text/babel" src="js/data/pyqData.js"></script>
<script type="text/babel" src="js/data/upscData.js"></script>
<script type="text/babel" src="js/data/mppscData.js"></script>
<script type="text/babel" src="js/data/mtechData.js"></script>
<script type="text/babel" src="js/data/corporateData.js"></script>
<script type="text/babel" src="js/data/modules.js"></script>

<!-- Hooks -->
<script type="text/babel" src="js/hooks/useModuleData.js"></script>

<!-- Components -->
<script type="text/babel" src="js/components/AppHeader.js"></script>
<script type="text/babel" src="js/components/Sidebar.js"></script>
<script type="text/babel" src="js/components/TopicList.js"></script>
<script type="text/babel" src="js/components/CurrentAffairsHeatmap.js"></script>
<script type="text/babel" src="js/components/MilestonesView.js"></script>
<script type="text/babel" src="js/components/ExportModal.js"></script>
<script type="text/babel" src="js/components/TrackerApp.js"></script>
<script type="text/babel" src="js/components/AuthScreens.js"></script>
<script type="text/babel" src="js/components/ModuleSelector.js"></script>
<script type="text/babel" src="js/components/ModuleTracker.js"></script>
<script type="text/babel" src="js/components/RootApp.js"></script>

<!-- Entry point -->
<script type="text/babel" src="js/main.js"></script>
</body>
</html>
