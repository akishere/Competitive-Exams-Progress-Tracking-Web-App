<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a40;
  --bg-input: #0f1623;
  --border: #2a3550;
  --border-active: #4a7cff;
  --text-primary: #e8ecf4;
  --text-secondary: #8896b3;
  --text-muted: #5a6a8a;
  --accent: #4a7cff;
  --accent-hover: #6190ff;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.1);
  --green-border: rgba(34,197,94,0.3);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.1);
  --amber-border: rgba(245,158,11,0.3);
  --red: #ef4444;
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.1);
  --cyan: #22d3ee;
  --cyan-bg: rgba(34,211,238,0.1);
  --static-tag: #3b82f6;
  --static-bg: rgba(59,130,246,0.12);
  --dynamic-tag: #f97316;
  --dynamic-bg: rgba(249,115,22,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
}

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

.app-header {
  background: linear-gradient(135deg, #111827 0%, #1a2744 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  position: sticky; top: 0; z-index: 100;
}
.app-header h1 {
  font-size: 22px; font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8ecf4, #4a7cff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.app-header .subtitle { font-size:13px; color:var(--text-muted); margin-top:2px; }

.top-bar {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:12px;
}
.header-stats {
  display:flex; gap:20px; align-items:center;
}
.stat-pill {
  display:flex; align-items:center; gap:6px;
  background: var(--bg-card); border:1px solid var(--border);
  border-radius:8px; padding:6px 14px; font-size:13px;
}
.stat-pill .num { font-weight:700; font-family:'JetBrains Mono',monospace; }
.stat-pill.green .num { color:var(--green); }
.stat-pill.amber .num { color:var(--amber); }
.stat-pill.purple .num { color:var(--purple); }

.header-actions { display:flex; gap:8px; }
.btn {
  font-family:inherit; font-size:12px; font-weight:600;
  padding:7px 14px; border-radius:7px; border:1px solid var(--border);
  background:var(--bg-card); color:var(--text-secondary);
  cursor:pointer; transition:all 0.15s;
}
.btn:hover { background:var(--bg-card-hover); color:var(--text-primary); border-color:var(--border-active); }
.btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.primary:hover { background:var(--accent-hover); }
.btn.danger { border-color:var(--red); color:var(--red); }
.btn.danger:hover { background:rgba(239,68,68,0.1); }

.main-container { display:flex; min-height:calc(100vh - 80px); }

.sidebar {
  width:260px; min-width:260px;
  background:var(--bg-secondary); border-right:1px solid var(--border);
  padding:16px 0; overflow-y:auto; position:sticky; top:80px;
  height:calc(100vh - 80px);
}
.sidebar-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px; cursor:pointer; transition:all 0.12s;
  border-left:3px solid transparent; font-size:13px; font-weight:500;
  color:var(--text-secondary);
}
.sidebar-item:hover { background:var(--bg-card); color:var(--text-primary); }
.sidebar-item.active {
  background:rgba(74,124,255,0.08); color:var(--accent);
  border-left-color:var(--accent);
}
.sidebar-item .emoji { margin-right:8px; font-size:15px; }
.sidebar-progress {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  padding:2px 8px; border-radius:10px;
  background:var(--bg-primary); color:var(--text-muted);
}
.sidebar-item.active .sidebar-progress { background:rgba(74,124,255,0.15); color:var(--accent); }

.sidebar-section-label {
  padding:16px 20px 6px; font-size:10px; font-weight:700;
  letter-spacing:1.2px; text-transform:uppercase; color:var(--text-muted);
}

.content { flex:1; padding:24px 32px; overflow-y:auto; }

.subject-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; flex-wrap:wrap; gap:12px;
}
.subject-title {
  font-size:20px; font-weight:800; letter-spacing:-0.3px;
}
.filter-bar { display:flex; gap:8px; align-items:center; }
.filter-btn {
  font-family:inherit; font-size:11px; font-weight:600;
  padding:5px 12px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--text-muted); cursor:pointer;
  transition:all 0.12s; text-transform:uppercase; letter-spacing:0.5px;
}
.filter-btn:hover { border-color:var(--text-secondary); color:var(--text-secondary); }
.filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

.progress-overview {
  background: var(--bg-card); border:1px solid var(--border); border-radius:10px;
  padding:16px 20px; margin-bottom:20px;
}
.progress-bar-outer {
  width:100%; height:8px; background:var(--bg-primary);
  border-radius:4px; overflow:hidden; margin-top:8px;
}
.progress-bar-inner {
  height:100%; border-radius:4px; transition:width 0.4s ease;
  background: linear-gradient(90deg, var(--accent), var(--green));
}
.progress-text {
  display:flex; justify-content:space-between; font-size:12px;
  color:var(--text-secondary); margin-top:6px;
}
.progress-text .pct { font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--green); }

.topic-group {
  margin-bottom:16px;
}
.topic-group-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:8px 8px 0 0; cursor:pointer; transition:all 0.12s;
}
.topic-group-header:hover { background:var(--bg-card-hover); }
.topic-group-header.collapsed { border-radius:8px; }
.topic-group-title {
  font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px;
}
.topic-group-title .arrow { font-size:10px; color:var(--text-muted); transition:transform 0.2s; }
.topic-group-title .arrow.open { transform:rotate(90deg); }
.topic-type-tag {
  font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px;
  text-transform:uppercase; letter-spacing:0.8px;
}
.tag-static { background:var(--static-bg); color:var(--static-tag); }
.tag-dynamic { background:var(--dynamic-bg); color:var(--dynamic-tag); }
.topic-group-meta {
  display:flex; align-items:center; gap:12px; font-size:12px; color:var(--text-muted);
}
.mini-progress {
  width:60px; height:4px; background:var(--bg-primary); border-radius:2px; overflow:hidden;
}
.mini-progress-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.3s; }

.subtopics-table {
  border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px;
  overflow:hidden;
}
.subtopic-row {
  display:grid;
  grid-template-columns: 1fr 80px 80px 80px 1fr;
  align-items:center; padding:0; border-bottom:1px solid rgba(42,53,80,0.5);
  transition:background 0.1s; font-size:13px;
}
.subtopic-row:last-child { border-bottom:none; }
.subtopic-row:hover { background:rgba(74,124,255,0.03); }
.subtopic-row.completed { opacity:0.6; }

.subtopic-row .cell {
  padding:8px 12px; display:flex; align-items:center;
}
.subtopic-row .cell.name { font-weight:500; padding-left:16px; gap:8px; }
.subtopic-row .cell.center { justify-content:center; }

.table-header {
  display:grid;
  grid-template-columns: 1fr 80px 80px 80px 1fr;
  background:var(--bg-primary); font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted);
}
.table-header .cell { padding:8px 12px; }
.table-header .cell.center { text-align:center; }

.checkbox-wrapper {
  position:relative; width:20px; height:20px; cursor:pointer;
}
.checkbox-wrapper input {
  position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; margin:0;
}
.checkbox-visual {
  width:18px; height:18px; border:2px solid var(--border);
  border-radius:4px; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; font-size:11px;
}
.checkbox-wrapper input:checked + .checkbox-visual {
  background:var(--green); border-color:var(--green); color:#fff;
}
.checkbox-wrapper.rev1 input:checked + .checkbox-visual {
  background:var(--amber); border-color:var(--amber);
}
.checkbox-wrapper.rev2 input:checked + .checkbox-visual {
  background:var(--purple); border-color:var(--purple);
}

.comment-input {
  width:100%; background:transparent; border:none; color:var(--text-secondary);
  font-family:inherit; font-size:12px; padding:8px 12px; outline:none;
}
.comment-input::placeholder { color:var(--text-muted); }
.comment-input:focus { color:var(--text-primary); }

.milestone-panel {
  padding:24px 32px;
}
.week-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
  margin-bottom:12px; overflow:hidden;
}
.week-card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; cursor:pointer;
}
.week-card-header:hover { background:var(--bg-card-hover); }
.week-label { font-weight:700; font-size:14px; }
.week-dates { font-size:12px; color:var(--text-muted); }
.week-status {
  font-size:11px; font-weight:700; padding:3px 10px; border-radius:5px;
}
.status-pending { background:var(--bg-primary); color:var(--text-muted); }
.status-active { background:rgba(74,124,255,0.15); color:var(--accent); }
.status-done { background:var(--green-bg); color:var(--green); }
.status-break { background:var(--amber-bg); color:var(--amber); }

.week-tasks { padding:4px 16px 12px; }
.week-task {
  display:flex; align-items:flex-start; gap:8px; padding:6px 0;
  font-size:13px; color:var(--text-secondary);
}
.week-task .checkbox-wrapper { flex-shrink:0; margin-top:1px; }

.export-modal {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex;
  align-items:center; justify-content:center; z-index:200;
}
.export-modal-content {
  background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
  padding:24px; max-width:500px; width:90%;
}
.export-modal h3 { font-size:16px; margin-bottom:12px; }
.export-textarea {
  width:100%; height:200px; background:var(--bg-primary); border:1px solid var(--border);
  border-radius:8px; padding:12px; color:var(--text-primary); font-family:'JetBrains Mono',monospace;
  font-size:11px; resize:none; outline:none;
}

.search-input {
  background:var(--bg-input); border:1px solid var(--border); border-radius:7px;
  padding:7px 12px; color:var(--text-primary); font-family:inherit; font-size:13px;
  outline:none; width:220px; transition:border-color 0.15s;
}
.search-input:focus { border-color:var(--border-active); }
.search-input::placeholder { color:var(--text-muted); }

@media (max-width:900px) {
  .sidebar { display:none; }
  .content { padding:16px; }
  .subtopic-row { grid-template-columns: 1fr 60px 60px 60px; }
  .subtopic-row .cell:last-child { display:none; }
  .table-header { grid-template-columns: 1fr 60px 60px 60px; }
  .table-header .cell:last-child { display:none; }
  .header-stats { display:none; }
}

/* ==================== LOGIN ==================== */
.login-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background: var(--bg-primary); padding:20px;
}
.login-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:14px;
  padding:36px; width:100%; max-width:360px; text-align:center;
  display:flex; flex-direction:column; gap:12px;
}
.login-logo { font-size:40px; }
.login-card h1 { font-size:20px; font-weight:800; letter-spacing:-0.3px; }
.login-subtitle { font-size:13px; color:var(--text-muted); margin-bottom:8px; }
.login-input {
  background:var(--bg-input); border:1px solid var(--border); border-radius:8px;
  padding:11px 14px; color:var(--text-primary); font-family:inherit; font-size:14px; outline:none;
  transition:border-color 0.15s;
}
.login-input:focus { border-color:var(--border-active); }
.login-input::placeholder { color:var(--text-muted); }
.login-error {
  color:var(--red); font-size:12px; background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.3); border-radius:6px; padding:8px;
}
.login-btn { padding:11px; font-size:13px; margin-top:4px; }
.setup-note {
  font-size:11px; color:var(--text-muted); text-align:left; line-height:1.6;
  background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:12px;
}
.setup-note code {
  font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:11px;
}

/* ==================== MODULE SELECTOR ==================== */
.module-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
  gap:18px; padding:32px;
}
.module-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
  padding:22px; cursor:pointer; transition:all 0.15s;
  display:flex; flex-direction:column; gap:10px;
}
.module-card:hover { border-color:var(--border-active); background:var(--bg-card-hover); transform:translateY(-2px); }
.module-card-emoji { font-size:32px; }
.module-card-name { font-size:16px; font-weight:700; }
.module-card-tagline { font-size:12px; color:var(--text-muted); min-height:32px; line-height:1.5; }
.module-card-pct { font-size:12px; color:var(--text-secondary); font-family:'JetBrains Mono',monospace; }
</style>
</head>

// ==================== STORAGE HELPERS ====================

function getSubtopicKey(subjectId, topicId, subtopicIdx) {
  return `${subjectId}__${topicId}__${subtopicIdx}`;
}

// Realtime Firestore-backed progress for one module, with debounced writes
// and a one-time migration from the old localStorage keys for the UPSC module.
function useModuleData(uid, moduleId) {
  const [data, setDataState] = React.useState({});
  const [milestones, setMilestonesState] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const latest = React.useRef({ data:{}, milestones:{} });
  const saveTimer = React.useRef(null);

  const docRef = React.useMemo(() => {
    if (!db || !uid || !moduleId) return null;
    return db.collection('users').doc(uid).collection('modules').doc(moduleId);
  }, [uid, moduleId]);

  React.useEffect(() => {
    if (!docRef) { setLoading(false); return; }
    setLoading(true);
    const unsub = docRef.onSnapshot(snap => {
      let d = {}, m = {};
      if (snap.exists) {
        const doc = snap.data() || {};
        d = doc.data || {};
        m = doc.milestones || {};
      } else if (moduleId === 'upsc') {
        try { d = JSON.parse(localStorage.getItem('upsc_tracker_v2')) || {}; } catch {}
        try { m = JSON.parse(localStorage.getItem('upsc_milestones_v2')) || {}; } catch {}
        docRef.set({ data:d, milestones:m, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      }
      latest.current = { data:d, milestones:m };
      setDataState(d);
      setMilestonesState(m);
      setLoading(false);
    }, () => setLoading(false));
    return () => { unsub(); clearTimeout(saveTimer.current); };
  }, [docRef]);

  function scheduleSave() {
    if (!docRef) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      docRef.set({
        data: latest.current.data,
        milestones: latest.current.milestones,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      }, { merge:true });
    }, 800);
  }

  function setData(updater) {
    setDataState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      latest.current.data = next;
      scheduleSave();
      return next;
    });
  }

  function setMilestones(updater) {
    setMilestonesState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      latest.current.milestones = next;
      scheduleSave();
      return next;
    });
  }

  return { data, setData, milestones, setMilestones, loading };
}

function TrackerApp({ module, data, setData, milestones, setMilestones, onBack, onLogout }) {
  const SUBJECTS_DATA = module.subjectsData;
  const MILESTONES_DATA = module.milestonesData;
  const [activeSubject, setActiveSubject] = React.useState(SUBJECTS_DATA[0].id);
  const [view, setView] = React.useState('subjects'); // subjects | milestones
  const [filter, setFilter] = React.useState('all'); // all | static | dynamic | pending | done
  const [search, setSearch] = React.useState('');
  const [showExport, setShowExport] = React.useState(false);
  const [collapsedTopics, setCollapsedTopics] = React.useState({});

  function updateField(key, field, value) {
    setData(prev => ({...prev, [key]: {...(prev[key]||{}), [field]: value}}));
  }

  function getStats() {
    let total = 0, completed = 0, rev1 = 0, rev2 = 0;
    SUBJECTS_DATA.forEach(sub => {
      sub.topics.forEach(topic => {
        topic.subtopics.forEach((_, idx) => {
          total++;
          const key = getSubtopicKey(sub.id, topic.id, idx);
          const d = data[key] || {};
          if (d.completed) completed++;
          if (d.rev1) rev1++;
          if (d.rev2) rev2++;
        });
      });
    });
    return { total, completed, rev1, rev2 };
  }

  function getSubjectStats(subjectId) {
    const sub = SUBJECTS_DATA.find(s => s.id === subjectId);
    if (!sub) return { total:0, completed:0 };
    let total = 0, completed = 0;
    sub.topics.forEach(topic => {
      topic.subtopics.forEach((_, idx) => {
        total++;
        const key = getSubtopicKey(sub.id, topic.id, idx);
        if ((data[key]||{}).completed) completed++;
      });
    });
    return { total, completed };
  }

  function getTopicStats(subjectId, topicId) {
    const sub = SUBJECTS_DATA.find(s => s.id === subjectId);
    const topic = sub?.topics.find(t => t.id === topicId);
    if (!topic) return {total:0, completed:0};
    let total = topic.subtopics.length, completed = 0;
    topic.subtopics.forEach((_, idx) => {
      const key = getSubtopicKey(subjectId, topicId, idx);
      if ((data[key]||{}).completed) completed++;
    });
    return { total, completed };
  }

  function exportProgress() {
    const exportData = { module: module.id, data, milestones, exportedAt: new Date().toISOString(), version: 3 };
    return JSON.stringify(exportData, null, 2);
  }

  function importProgress(jsonStr) {
    try {
      const imported = JSON.parse(jsonStr);
      if (imported.data) setData(imported.data);
      if (imported.milestones) setMilestones(imported.milestones);
      alert('Progress imported successfully!');
    } catch { alert('Invalid JSON. Please check the format.'); }
  }

    ),

    React.createElement('div', {className:'main-container'},
      // SIDEBAR
      view === 'subjects' && React.createElement('nav', {className:'sidebar'},

          ),

            React.createElement('input', {
              className:'search-input', placeholder:'Search topics...',
              value:search, onChange:e=>setSearch(e.target.value)

            ['all','static','dynamic','pending','done'].map(f =>
              React.createElement('button', {
                key:f, className:'filter-btn'+(filter===f?' active':''),
                onClick:()=>setFilter(f)
              }, f)
            )
          )
        ),

        // Progress bar
        (() => {
          const ss = getSubjectStats(activeSub.id);
          const p = ss.total ? Math.round(ss.completed/ss.total*100) : 0;
          return React.createElement('div', {className:'progress-overview'},
            React.createElement('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              React.createElement('span', {style:{fontSize:'13px',fontWeight:600}}, 'Overall Progress'),
              React.createElement('span', {className:'pct', style:{fontSize:'13px',fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:'var(--green)'}}, p+'%')
            ),
            React.createElement('div', {className:'progress-bar-outer'},
              React.createElement('div', {className:'progress-bar-inner', style:{width:p+'%'}})
            ),
            React.createElement('div', {className:'progress-text'},
              React.createElement('span', null, ss.completed+' of '+ss.total+' subtopics completed'),
            )
          );
        })(),

        // Topic groups
        activeSub.topics.filter(topic => {
          if (filter === 'static' && topic.type !== 'static') return false;

          if (search) {
            const q = search.toLowerCase();
            if (topic.name.toLowerCase().includes(q)) return true;
            return topic.subtopics.some(s => s.toLowerCase().includes(q));
          }
          return true;
        }).map(topic => {
          const ts = getTopicStats(activeSub.id, topic.id);

          const filteredSubtopics = topic.subtopics.filter((st, idx) => {

    )
  );

// ==================== AUTH / MODULE SHELL ====================

function SetupRequiredScreen() {
  return React.createElement('div', {className:'login-screen'},
    React.createElement('div', {className:'login-card'},
      React.createElement('div', {className:'login-logo'}, '⚙️'),
      React.createElement('h1', null, 'Firebase Setup Required'),
      React.createElement('div', {className:'login-subtitle'}, 'Add your Firebase project config to enable login and realtime sync.'),
      React.createElement('div', {className:'setup-note'},
        '1. Open ', React.createElement('code', null, 'index.html'), ' in an editor.', React.createElement('br'),
        '2. Find the ', React.createElement('code', null, 'firebaseConfig'), ' object near the top of the script.', React.createElement('br'),
        '3. Replace the placeholder values with your Firebase project’s web app config.', React.createElement('br'),
        '4. See README.md for the full step-by-step setup guide.'
      )
    )
  );
}

function LoginScreen() {
  const [username, setUsername] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError] = React.useState('');
  const [busy, setBusy] = React.useState(false);

  function handleSubmit(e) {
    e.preventDefault();
    setError('');
    if (username.trim().toLowerCase() !== 'admin') {
      setError('Invalid username or password.');
      return;
    }
    setBusy(true);
    auth.signInWithEmailAndPassword(ADMIN_EMAIL, password)
      .catch(() => setError('Invalid username or password.'))
      .finally(() => setBusy(false));
  }

  return React.createElement('div', {className:'login-screen'},
    React.createElement('form', {className:'login-card', onSubmit:handleSubmit},
      React.createElement('div', {className:'login-logo'}, '🎯'),
      React.createElement('h1', null, 'Exam Prep Tracker'),
      React.createElement('div', {className:'login-subtitle'}, 'Sign in to access your progress'),
      React.createElement('input', {
        className:'login-input', placeholder:'Username', value:username, autoFocus:true,
        autoComplete:'username', onChange:e=>setUsername(e.target.value)
      }),
      React.createElement('input', {
        className:'login-input', type:'password', placeholder:'Password', value:password,
        autoComplete:'current-password', onChange:e=>setPassword(e.target.value)
      }),
      error && React.createElement('div', {className:'login-error'}, error),
      React.createElement('button', {className:'btn primary login-btn', type:'submit', disabled:busy},
        busy ? 'Signing in…' : 'Log In'
      )
    )
  );
}

function ModuleSelector({ uid, onSelect, onLogout }) {
  const [progress, setProgress] = React.useState({});

  React.useEffect(() => {
    if (!db || !uid) return;
    MODULES.forEach(mod => {
      db.collection('users').doc(uid).collection('modules').doc(mod.id).get().then(snap => {
        const d = snap.exists ? (snap.data().data || {}) : {};
        let total = 0, completed = 0;
        mod.subjectsData.forEach(sub => sub.topics.forEach(topic => topic.subtopics.forEach((_, idx) => {
          total++;
          if ((d[getSubtopicKey(sub.id, topic.id, idx)] || {}).completed) completed++;
        })));
        setProgress(prev => ({...prev, [mod.id]: total ? Math.round(completed/total*100) : 0}));
      }).catch(()=>{});
    });
  }, [uid]);

  return React.createElement('div', null,
    React.createElement('header', {className:'app-header'},
      React.createElement('div', {className:'top-bar'},
        React.createElement('div', null,
          React.createElement('h1', null, '🗂️ Exam Prep Tracker'),
          React.createElement('div', {className:'subtitle'}, 'Choose a module to continue')
        ),
        React.createElement('div', {className:'header-actions'},
          React.createElement('button', {className:'btn danger', onClick:onLogout}, '🚪 Logout')
        )
      )
    ),
    React.createElement('div', {className:'module-grid'},
      MODULES.map(mod => React.createElement('div', {
        key:mod.id, className:'module-card', onClick:()=>onSelect(mod.id)
      },
        React.createElement('div', {className:'module-card-emoji'}, mod.emoji),
        React.createElement('div', {className:'module-card-name'}, mod.name),
        React.createElement('div', {className:'module-card-tagline'}, mod.tagline || ''),
        React.createElement('div', {className:'progress-bar-outer'},
          React.createElement('div', {className:'progress-bar-inner', style:{width:(progress[mod.id]||0)+'%'}})
        ),
        React.createElement('div', {className:'module-card-pct'}, (progress[mod.id]||0)+'% complete')
      ))
    )
  );
}

function ModuleTracker({ uid, module, onBack, onLogout }) {
  const { data, setData, milestones, setMilestones, loading } = useModuleData(uid, module.id);
  if (loading) {
    return React.createElement('div', {className:'login-screen'},
      React.createElement('div', {className:'login-card'}, 'Loading '+module.name+'…')
    );
  }
  return React.createElement(TrackerApp, { module, data, setData, milestones, setMilestones, onBack, onLogout });
}

function RootApp() {
  const [authUser, setAuthUser] = React.useState(undefined); // undefined=checking, null=logged out
  const [activeModuleId, setActiveModuleId] = React.useState(() => localStorage.getItem('last_module_id') || null);

  React.useEffect(() => {
    if (!auth) { setAuthUser(null); return; }
    return auth.onAuthStateChanged(setAuthUser);
  }, []);

  if (!FIREBASE_READY) return React.createElement(SetupRequiredScreen);

  if (authUser === undefined) {
    return React.createElement('div', {className:'login-screen'}, React.createElement('div', {className:'login-card'}, 'Loading…'));
  }

  if (!authUser) return React.createElement(LoginScreen);

  if (!activeModuleId) {
    return React.createElement(ModuleSelector, {
      uid: authUser.uid,
      onSelect: id => { localStorage.setItem('last_module_id', id); setActiveModuleId(id); },
      onLogout: () => { localStorage.removeItem('last_module_id'); auth.signOut(); },
    });
  }

  const module = MODULES.find(m => m.id === activeModuleId);
  return React.createElement(ModuleTracker, {
    key: module.id,
    uid: authUser.uid,
    module,
    onBack: () => { localStorage.removeItem('last_module_id'); setActiveModuleId(null); },
    onLogout: () => { localStorage.removeItem('last_module_id'); setActiveModuleId(null); auth.signOut(); },
  });
}

ReactDOM.render(React.createElement(RootApp), document.getElementById('root'));
</script>
